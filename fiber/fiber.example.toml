# Fiber configuration example
# Copy to fiber.toml and customize
# Add more [[metrics]] with type = "lint" to run additional linters.
# Perfect penalty score is 0; higher = more issues found.

[[metrics]]
name = "eslint"
type = "lint"
command = "npx eslint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "oxlint"
type = "lint"
command = "npx oxlint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "test_coverage"
type = "coverage"
command = "npx vitest run --coverage --reporter=json 2>/dev/null | tail -1"

[[metrics]]
name = "typescript_errors"
type = "count"
command = "npx tsc --noEmit 2>&1 | grep 'error TS' | wc -l | tr -d ' '"

[[metrics]]
name = "custom_penalty"
type = "score"
command = "scripts/my-penalty.sh"

[[metrics]]
name = "no_ts_any"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
ast_count_type_reference = ["TSAnyKeyword", "TsFixMe"]
error_penalty = 5.0

[[metrics]]
name = "eslint_disable_comments"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
comment_startswith = ["eslint-disable"]
error_penalty = 2.0

[[metrics]]
name = "banned_comment_patterns"
type = "ast"
files = ["src/**/*.ts"]
comment_contains = ["TODO", "FIXME", "HACK"]
error_penalty = 1.0

[[metrics]]
name = "long_functions"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
max_function_lines = 40
error_penalty = 1.0

[[metrics]]
name = "long_files"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
max_file_lines = 300
error_penalty = 1.0
