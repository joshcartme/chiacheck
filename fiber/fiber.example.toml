# Fiber configuration example
# Copy to fiber.toml and customize
# Add more [[metrics]] with type = "lint" to run additional linters.
# Perfect penalty score is 0; higher = more issues found.

# ---------------------------------------------------------------------------
# Optional database section — omit entirely to disable SQLite caching.
# When enabled = true, every successful score is persisted in SQLite keyed by
# commit hash and repo-relative config path, so repeated runs (fiber score,
# fiber range, fiber history) can reuse cached results and skip re-running
# metrics. Different --config files in the same repo get separate cache rows.
#
# [database]
# enabled = true
#
# Explicit path (default: fiber.db in the current working directory):
# [database]
# enabled = true
# path = "./fiber.db"
#
# Prompts:
#   • Missing DB file  — fiber asks "(c)reate / (q)uit [q]"; declining exits
#     with instructions to set enabled = false or remove [database].
#     In non-interactive environments (is_terminal = false) the prompt short-
#     circuits to quit immediately without reading stdin.
#   • Cached commit (fiber score only) — if the current commit already has a
#     cached score, fiber asks "(s)how cached / (r)e-run [s]"; default is to
#     show the cached score. Non-interactive: always shows cached.
#   • fiber range / fiber history — cached commits are silently reused; no
#     prompt is shown.
#
# --force flag — available on all three commands to bypass the cache and always
# recompute + overwrite:
#   fiber score --force
#   fiber range --from SHA --to SHA --force
#   fiber history --days 30 --force
# ---------------------------------------------------------------------------

[[metrics]]
name = "eslint"
type = "lint"
command = "npx eslint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "oxlint"
type = "lint"
command = "npx oxlint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "test_coverage"
type = "coverage"
command = "npx vitest run --coverage --reporter=json 2>/dev/null | tail -1"

[[metrics]]
name = "typescript_errors"
type = "count"
command = "npx tsc --noEmit 2>&1 | grep 'error TS' | wc -l | tr -d ' '"

[[metrics]]
name = "custom_penalty"
type = "score"
command = "scripts/my-penalty.sh"

[[metrics]]
name = "no_ts_any"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
ast_count_type_reference = ["TSAnyKeyword", "TsFixMe"]
error_penalty = 5.0

[[metrics]]
name = "eslint_disable_comments"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
comment_startswith = ["eslint-disable"]
error_penalty = 2.0

[[metrics]]
name = "banned_comment_patterns"
type = "ast"
files = ["src/**/*.ts"]
comment_contains = ["TODO", "FIXME", "HACK"]
error_penalty = 1.0

[[metrics]]
name = "long_functions"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
max_function_lines = 40
error_penalty = 1.0

[[metrics]]
name = "long_files"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
max_file_lines = 300
error_penalty = 1.0
