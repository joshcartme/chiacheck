# Fiber configuration example
# Copy to fiber.toml and customize

[[metrics]]
name = "eslint"
type = "eslint"
weight = 30.0
command = "npx eslint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "oxlint"
type = "oxlint"
weight = 20.0
command = "npx oxlint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "test_coverage"
type = "coverage"
weight = 30.0
command = "npx vitest run --coverage --reporter=json"
min_threshold = 60.0

[[metrics]]
name = "typescript_errors"
type = "count"
weight = 20.0
command = "npx tsc --noEmit 2>&1 | grep 'error TS' | wc -l"
max_count = 50.0

[[metrics]]
name = "custom_score"
type = "score"
weight = 10.0
command = "scripts/my-score.sh"
