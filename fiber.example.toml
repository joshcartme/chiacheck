# Fiber configuration example
# Copy to fiber.toml and customize
# Add more [[metrics]] with type = "lint" to run additional linters.

[[metrics]]
name = "eslint"
type = "lint"
weight = 30.0
command = "npx eslint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "oxlint"
type = "lint"
weight = 20.0
command = "npx oxlint . --format json"
error_penalty = 1.0
warning_penalty = 0.5

[[metrics]]
name = "test_coverage"
type = "coverage"
weight = 30.0
command = "npx vitest run --coverage --reporter=json"
min_threshold = 60.0

[[metrics]]
name = "typescript_errors"
type = "count"
weight = 20.0
command = "npx tsc --noEmit 2>&1 | grep 'error TS' | wc -l"
max_count = 50.0

[[metrics]]
name = "custom_score"
type = "score"
weight = 10.0
command = "scripts/my-score.sh"

[[metrics]]
name = "no_ts_any"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
ast_count_node = "TSAnyKeyword"
error_penalty = 5.0
weight = 15.0

[[metrics]]
name = "eslint_disable_comments"
type = "ast"
files = ["src/**/*.ts", "src/**/*.tsx"]
comment_startswith = ["eslint-disable"]
error_penalty = 2.0
weight = 10.0

[[metrics]]
name = "banned_comment_patterns"
type = "ast"
files = ["src/**/*.ts"]
comment_contains = ["TODO", "FIXME", "HACK"]
error_penalty = 1.0
weight = 5.0
