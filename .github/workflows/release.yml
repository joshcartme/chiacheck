name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (otherwise build-only dry run)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            bin: chiacheck
          - target: x86_64-apple-darwin
            os: macos-14
            bin: chiacheck
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            bin: chiacheck
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            bin: chiacheck
            linux_cross_arm64: true
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            bin: chiacheck.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install aarch64 Linux cross toolchain
        if: matrix.linux_cross_arm64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
            echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
          } >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          if [ "${{ matrix.linux_cross_arm64 }}" = "true" ]; then
            aarch64-linux-gnu-strip "$bin"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            strip -x "$bin"
          else
            strip "$bin"
          fi

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/${{ matrix.bin }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    # Publish on tag pushes, or manual runs with publish=true.
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bin-*

      - name: Assemble npm packages
        run: node scripts/assemble-npm-packages.mjs

      - name: Publish
        run: bash scripts/publish-npm.sh
        # Bootstrap only (first release, before trusted publishers exist): uncomment
        # the env block and set the NPM_TOKEN secret. Once trusted publishers are
        # configured for all packages, re-comment it to use pure OIDC.
        # env:
        #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
