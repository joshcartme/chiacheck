name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm (otherwise build-only dry run)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      # Single source of truth: Cargo.toml and the launcher package.json must agree.
      - name: Resolve and validate version
        id: resolve
        run: |
          version=$(node scripts/release-version.mjs)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"

      # Tag pushes carry their own version: it must match the resolved one, else
      # the pushed tag and the published packages would disagree.
      - name: Tag matches resolved version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          resolved="${{ steps.resolve.outputs.version }}"
          if [ "$tag_version" != "$resolved" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match version $resolved in chiacheck/Cargo.toml and npm/chiacheck/package.json."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches version $resolved."

      # A manual publish mints the tag itself, so refuse to clobber an existing one.
      # (Tag pushes are exempt: the tag necessarily already exists — it triggered us.)
      - name: Ensure tag does not already exist
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        run: |
          tag="v${{ steps.resolve.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::tag $tag already exists. Bump the version in chiacheck/Cargo.toml and npm/chiacheck/package.json before publishing."
            exit 1
          fi
          echo "$tag is available."

  build:
    name: build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            bin: chiacheck
          - target: x86_64-apple-darwin
            os: macos-14
            bin: chiacheck
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            bin: chiacheck
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            bin: chiacheck
            linux_cross_arm64: true
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            bin: chiacheck.exe
    steps:
      - uses: actions/checkout@v6

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install aarch64 Linux cross toolchain
        if: matrix.linux_cross_arm64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
            echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
          } >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          if [ "${{ matrix.linux_cross_arm64 }}" = "true" ]; then
            aarch64-linux-gnu-strip "$bin"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            strip -x "$bin"
          else
            strip "$bin"
          fi

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: dist/${{ matrix.bin }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish to npm
    needs: [preflight, build]
    runs-on: ubuntu-latest
    # Publish on tag pushes, or manual runs with publish=true.
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bin-*

      - name: Assemble npm packages
        # Use the version resolved by preflight (Cargo.toml == package.json) for
        # both tag pushes and manual dispatch; the script re-asserts it matches
        # Cargo.toml as a final guard.
        run: node scripts/assemble-npm-packages.mjs ${{ needs.preflight.outputs.version }}

      - name: Publish
        run: bash scripts/publish-npm.sh
        # Bootstrap (first release, before trusted publishers exist): uses the
        # NPM_TOKEN secret. Once trusted publishers are configured for every
        # package on npmjs.com, re-comment this env block to use pure OIDC.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  tag:
    name: tag release
    # Only manual publishes mint a tag; tag pushes already have one. Runs after a
    # successful publish so a failed release never leaves a tag behind.
    needs: [preflight, publish]
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release tag
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        env:
          # Pushing with GITHUB_TOKEN does not re-trigger the `push: tags` workflow,
          # so this won't kick off a redundant release run.
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          tag="v$VERSION"
          git tag "$tag"
          git push origin "$tag"
          echo "Pushed $tag."
